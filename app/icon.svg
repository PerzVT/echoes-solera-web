<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background -->
  <rect width="32" height="32" fill="#050208"/>
  <!-- Top facet cap -->
  <polygon
    points="16,4 24,13 8,13"
    fill="rgba(185,108,230,0.12)"
    stroke="#B96CE6"
    stroke-width="1.2"
    stroke-linejoin="round"
  />
  <!-- Lower body -->
  <polygon
    points="8,13 24,13 16,28"
    fill="rgba(185,108,230,0.08)"
    stroke="#B96CE6"
    stroke-width="1.2"
    stroke-linejoin="round"
  />
  <!-- Left facet line -->
  <line x1="16" y1="4" x2="8" y2="13" stroke="#E6B8FF" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- Right facet line -->
  <line x1="16" y1="4" x2="24" y2="13" stroke="#E6B8FF" stroke-width="0.8" stroke-opacity="0.5"/>
  <!-- Center cut lines -->
  <line x1="10" y1="13" x2="16" y2="18" stroke="#E6B8FF" stroke-width="0.6" stroke-opacity="0.4"/>
  <line x1="22" y1="13" x2="16" y2="18" stroke="#E6B8FF" stroke-width="0.6" stroke-opacity="0.4"/>
</svg>
